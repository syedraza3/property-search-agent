name: Property Search

on:
  schedule:
    # Every day at 9pm UK time
    - cron: "0 21 * * *"
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      # ── Restore seen listings cache ──────────────────────────────────────
      - name: Restore seen listings cache
        uses: actions/cache@v6
        with:
          path: seen_listings.json
          key: seen-listings-${{ runner.os }}
          restore-keys: |
            seen-listings-

      # ── Python setup ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Run the agent ────────────────────────────────────────────────────
      - name: Run property search agent
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python agent.py

      # ── Save updated seen listings cache ─────────────────────────────────
      - name: Save seen listings cache
        uses: actions/cache/save@v6
        if: always()
        with:
          path: seen_listings.json
          key: seen-listings-${{ runner.os }}-${{ github.run_id }}
